name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build and Publish ${{ matrix.name }} Bundles
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux AppImage
            platform: ubuntu-22.04
            rustTarget: ""
            args: ""
          - name: Windows NSIS
            platform: windows-latest
            rustTarget: ""
            args: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            rustTarget: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
          - name: macOS Intel
            platform: macos-latest
            rustTarget: x86_64-apple-darwin
            args: --target x86_64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: ${{ matrix.rustTarget != '' }}
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Cache Rust build outputs
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: WorktreeDesk ${{ github.ref_name }}
          releaseBody: See the assets below to download this version of WorktreeDesk.
          generateReleaseNotes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}